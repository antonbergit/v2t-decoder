services:
  v2t-decoder:
    build:
      context: .
      dockerfile: Dockerfile
    image: v2t-decoder:latest
    container_name: v2t-decoder
    working_dir: /app/workspace
    command: ["--config", "${CONFIG_FILE:-config.yaml}"]
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./:/app/workspace
      - whisper-cache:/root/.cache/huggingface
    restart: "no"

volumes:
  whisper-cache:
