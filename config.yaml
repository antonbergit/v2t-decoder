video_file: ./test-example/2025-12-20_17-59-46.mkv
output_dir: ./output
mode: demo

# Hardcoded MVP defaults (can be overridden here)
demo_duration_sec: 60
fragment_size_min: 10
max_video_duration_sec: 7200

whisper_model: medium
device: auto
language: ru
initial_prompt: "Russian and Ukrainian speech. Do not translate. Transcribe verbatim."
beam_size: 5
vad_filter: true

# Fixed channel strategy (default from successful case)
preferred_stream_index: 1
s1_channel: FL
s2_channel: FR

# Optional fast channel check (disabled by default)
enable_channel_prescan: false
prescan_duration_sec: 8

audio_bitrate: 128k
min_text_len: 2
